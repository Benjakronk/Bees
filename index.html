<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BIER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0703;
    overflow: hidden;
    cursor: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    /* faint warm glow behind the "monitor" */
    background:
      radial-gradient(ellipse at 50% 50%, #1a1206 0%, #0a0703 60%, #050302 100%);
  }
  #stage {
    position: relative;
    /* sized by JS to integer scale of 320x200 */
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%; height: 100%;
    background: #000;
  }
  /* CRT overlay: scanlines + vignette + subtle RGB mask, pure CSS, toggleable */
  #crt {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.35) 100%),
      repeating-linear-gradient(to bottom,
        rgba(0,0,0,0)    0px,
        rgba(0,0,0,0)    2px,
        rgba(0,0,0,0.22) 3px),
      repeating-linear-gradient(to right,
        rgba(255,0,0,0.03) 0px, rgba(0,255,0,0.02) 1px, rgba(0,0,255,0.03) 2px, rgba(0,0,0,0) 3px);
  }
  #crt.off { display: none; }
  /* phosphor flicker */
  #crt::after {
    content: "";
    position: absolute; inset: 0;
    background: rgba(255, 230, 160, 0.012);
    animation: flick 0.09s steps(2) infinite;
  }
  @keyframes flick { 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="320" height="200"></canvas>
  <div id="crt"></div>
</div>
<script src="js/font.js"></script>
<script src="js/sfx.js"></script>
<script src="js/worldgen.js"></script>
<script src="js/terrain.js"></script>
<script src="js/comb.js"></script>
<script src="js/entities.js"></script>
<script src="js/hive.js"></script>
<script src="js/save.js"></script>
<script src="js/main.js"></script>
</body>
</html>
